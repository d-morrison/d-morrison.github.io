name: Quarto Preview

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
    paths:
      - '_quarto.yml'
      - '.github/workflows/preview.yml'
      - '.github/workflows/publish.yml'
      - '*.qmd'
      - 'static/**'
      - 'styles.css'
      - 'data/**'

concurrency: preview-${{ github.ref }}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        if: github.event.action != 'closed'
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        if: github.event.action != 'closed'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            poppler-utils \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libuv1-dev

      - name: Install R packages
        if: github.event.action != 'closed'
        run: |
          install.packages(c("rmarkdown", "knitr", "ggplot2", "dplyr", "tidyr"))
        shell: Rscript {0}

      - name: Build site
        if: github.event.action != 'closed'
        run: |
          chmod +x ./build.sh
          ./build.sh
          
      - name: Deploy PR Preview
        uses: rossjrw/pr-preview-action@main
        with:
          source-dir: docs/
          wait-for-pages-deployment: true
