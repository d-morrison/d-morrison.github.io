name: Refresh Software Data

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC
  workflow_dispatch:      # Manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install R packages
        run: Rscript -e 'install.packages("jsonlite", repos = "https://cloud.r-project.org")'

      - name: Refresh PR counts and regenerate software page
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: Rscript data/generate_software_page.R --refresh

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/software_repos.json software.qmd
          git diff --staged --quiet || git commit -m "chore: refresh software page PR counts"
          git push
